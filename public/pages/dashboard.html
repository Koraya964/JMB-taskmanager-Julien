<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JMB_TaskManager Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Palette du figma
            bg: '#A8C3EA',    // Bleu clair
            card: '##5D62EE',  // Bleu
            border: '#334155', // slate-700
            text: '#000',  // Noir
            primary: '#000', // Noir
          },
          fontFamily: {
            mono: ['Fira Code', 'Courier New', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    /* Petit style perso pour le look retro/dev  */
    .border-pixel {
      border-width: 2px;
    }
  </style>
</head>

<body class="bg-bg text-text font-sans antialiased">

  <header class="border-b-2 border-border sticky top-0 z-10 bg-bg">
    <div class="max-w-[90rem] mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded bg-primary flex items-center justify-center font-mono font-bold text-bg"> >_ </div>
        <h1 class="text-xl font-mono font-bold tracking-tight">JMB<span class="text-primary">.tasks</span></h1>
      </div>

      <div class="flex items-center gap-3">
        <a href="/tasks"
          class="text-sm font-semibold text-text bg-card border-2 border-border px-5 py-2.5 rounded hover:bg-slate-700 transition-colors flex items-center gap-2">
          >_ Tasks
        </a>
        <button
          class="p-2.5 rounded border-2 border-border bg-card text-black hover:bg-red-950 hover:text-red-300 transition-colors"
          id="logoutBtn" title="Se déconnecter" aria-label="Se déconnecter">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-[90rem] mx-auto px-6 mt-8 mb-8">

    <div class="bg-card p-6 rounded-lg border-2 border-border flex items-center justify-between gap-6 mb-8 font-mono">
      <div class="flex items-center gap-6">
        <div class="stat-item">
          <span class="text-4xl font-extrabold text-black" id="statTotal">—</span>
          <span class="text-xs text-black block tracking-wider uppercase">Total</span>
        </div>
        <div class="w-px h-12 bg-border" aria-hidden="true"></div>
        <div class="stat-item">
          <span class="text-4xl font-extrabold text-emerald-700 " id="statDone">—</span>
          <span class="text-xs text-black block tracking-wider uppercase">Validé</span>
        </div>
        <div class="w-px h-12 bg-border" aria-hidden="true"></div>
        <div class="stat-item">
          <span class="text-4xl font-extrabold text-orange-600" id="statPending">—</span>
          <span class="text-xs text-black block tracking-wider uppercase">En Attente</span>
        </div>
        <div class="w-px h-12 bg-border" aria-hidden="true"></div>
        <div class="stat-item">
          <span class="text-4xl font-extrabold text-red-600" id="statUrgent">—</span>
          <span class="text-xs text-black block tracking-wider uppercase">Urgent</span>
        </div>
      </div>
      <span id="welcomeMsg" class="text-sm font-mono text-primary bg-bg border border-border px-4 py-2 rounded"></span>
    </div>

    <div class="grid grid-cols-2 gap-8 pb-12">

      <div class="bg-card p-6 rounded-lg border-2 border-border col-span-1 row-span-2 flex flex-col h-[70vh]">
        <div class="flex items-center justify-between mb-6 flex-shrink-0 border-b-2 border-border pb-4">
          <h2 class="text-lg font-mono font-bold tracking-tight text-text">./Semaine</h2>
          <button onclick="openTaskModal('semaine')"
            class="text-xs font-semibold text-primary hover:text-white flex items-center gap-1.5"
            aria-label="Ajouter une tâche cette semaine">
            + add
          </button>
        </div>
        <div id="colSemaine" class="flex-grow space-y-3 overflow-y-auto pr-2 -mr-2">
        </div>
      </div>

      <div class="bg-card p-6 rounded-lg border-2 border-border col-span-1 flex flex-col h-[33vh]">
        <div class="flex items-center justify-between mb-6 flex-shrink-0 border-b-2 border-border pb-4">
          <h2 class="text-lg font-mono font-bold tracking-tight text-red-600">./Urgent</h2>
          <button onclick="openTaskModal('urgent')"
            class="text-xs font-semibold text-primary hover:text-white flex items-center gap-1.5"
            aria-label="Ajouter une tâche urgente">
            + add
          </button>
        </div>
        <div id="colUrgent" class="flex-grow space-y-3 overflow-y-auto pr-2 -mr-2"></div>
      </div>

      <div class="bg-card p-6 rounded-lg border-2 border-border col-span-1 flex flex-col h-[33vh]">
        <div class="flex items-center justify-between mb-6 flex-shrink-0 border-b-2 border-border pb-4">
          <h2 class="text-lg font-mono font-bold tracking-tight text-text">./Aujourd_hui</h2>
          <button onclick="openTaskModal('aujourd_hui')"
            class="text-xs font-semibold text-primary hover:text-white flex items-center gap-1.5"
            aria-label="Ajouter une tâche pour aujourd'hui">
            + add
          </button>
        </div>
        <div id="colAujourdhui" class="flex-grow space-y-3 overflow-y-auto pr-2 -mr-2"></div>
      </div>

    </div>
  </main>

  <button
    class="fixed bottom-8 right-8 p-4 rounded-full bg-primary text-bg shadow-lg hover:bg-white transition-all hover:scale-105 active:scale-95"
    id="fabBtn" title="Ajouter une tâche" aria-label="Ajouter une tâche">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
      stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19" />
      <line x1="5" y1="12" x2="19" y2="12" />
    </svg>
  </button>

  <script type="module" src="/js/dashboard.js"></script>
</body>

</html>
