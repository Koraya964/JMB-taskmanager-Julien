<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JMB_TaskManager :: Tasks</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Palette du figma
            bg: '#A8C3EA',    // Bleu clair
            card: '##5D62EE',  // Bleu
            border: '#334155', // slate-700
            text: '#000',  // Noir
            primary: '#000', // Noir
          },
          fontFamily: {
            mono: ['Fira Code', 'Courier New', 'monospace'],
          }
        }
      }
    }
  </script>
</head>

<body class="bg-bg text-text font-sans antialiased">

  <header class="border-b-2 border-border sticky top-0 z-10 bg-bg">
    <div class="max-w-[90rem] mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded bg-primary flex items-center justify-center font-mono font-bold text-bg"> >_ </div>
        <h1 class="text-xl font-mono font-bold tracking-tight">JMB<span class="text-primary">.tasks</span></h1>
      </div>

      <div class="flex items-center gap-3">
        <a href="/dashboard"
          class="text-sm font-semibold text-text bg-card border-2 border-border px-5 py-2.5 rounded hover:bg-slate-700 transition-colors flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          >_ Dashboard ..
        </a>
        <button
          class="p-2.5 rounded border-2 border-border bg-card text-black hover:bg-red-950 hover:text-red-300 transition-colors"
          id="logoutBtn" title="Se déconnecter" aria-label="Se déconnecter">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-[90rem] mx-auto px-6 py-8">

    <div class="flex flex-wrap items-center justify-between gap-4 mb-8 bg-card p-4 rounded border-2 border-border">
      <div class="flex flex-wrap items-center gap-4 flex-grow">
        <button
          class="flex items-center gap-2 px-4 py-2 bg-primary text-bg rounded font-mono text-sm font-semibold hover:bg-white transition-colors"
          id="addBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
            stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          task_new()
        </button>

        <select
          class="text-sm border-2 border-border rounded px-3 py-2 bg-bg text-text font-mono focus:ring-2 focus:ring-primary focus:border-primary transition-all"
          id="filterCategory">
          <option value="">Tous</option>
          <option value="semaine">Semaine</option>
          <option value="urgent">Urgent</option>
          <option value="aujourd_hui">Aujourd_hui</option>
        </select>

        <select
          class="text-sm border-2 border-border rounded px-3 py-2 bg-bg text-text font-mono focus:ring-2 focus:ring-primary focus:border-primary transition-all"
          id="filterStatus">
          <option value="">Tous statuts</option>
          <option value="false">En cours</option>
          <option value="true">Terminées</option>
        </select>
      </div>

      <span id="taskCount" class="text-sm font-mono text-primary bg-bg border border-border px-4 py-1.5 rounded"></span>
    </div>

    <div id="taskList" class="flex flex-col gap-3">
      <div class="animate-pulse flex gap-4 items-center bg-card p-4 rounded border-2 border-border">
        <div class="rounded bg-border h-6 w-6"></div>
        <div class="h-4 bg-border rounded-full w-full"></div>
      </div>
    </div>
  </main>

  <div
    class="fixed inset-0 bg-bg/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300"
    id="taskModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div
      class="bg-card rounded-lg shadow-xl w-full max-w-lg p-6 border-2 border-border transform scale-95 transition-transform duration-300">

      <h2 class="text-xl font-mono font-bold text-primary mb-6" id="modalTitle">Nouvelle tâche</h2>

      <div class="space-y-4">
        <div class="form-group">
          <label for="mTitle" class="block text-sm font-semibold text-black mb-1">Titre <span
              class="text-primary">*</span></label>
          <input
            class="w-full text-sm border-2 border-border rounded px-4 py-2.5 bg-bg text-text font-mono focus:ring-2 focus:ring-primary focus:border-primary transition-all"
            type="text" id="mTitle" placeholder="Ex : git commit..." />
        </div>

        <div class="form-group">
          <label for="mDesc" class="block text-sm font-semibold text-black mb-1">Description</label>
          <textarea
            class="w-full text-sm border-2 border-border rounded px-4 py-2.5 bg-bg text-text font-mono focus:ring-2 focus:ring-primary focus:border-primary transition-all"
            id="mDesc" rows="3" placeholder="Détails..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="form-group">
            <label for="mPriority" class="block text-sm font-semibold text-black mb-1">Priorité</label>
            <select
              class="w-full text-sm border-2 border-border rounded px-4 py-2.5 bg-bg text-text font-mono focus:ring-2 focus:ring-primary focus:border-primary transition-all"
              id="mPriority">
              <option value="low">Basse</option>
              <option value="medium" selected>Moyenne</option>
              <option value="high">Haute</option>
              <option value="urgent">Urgente</option>
            </select>
          </div>
          <div class="form-group">
            <label for="mTag" class="block text-sm font-semibold text-black mb-1">Tag</label>
            <input
              class="w-full text-sm border-2 border-border rounded px-4 py-2.5 bg-bg text-text font-mono focus:ring-2 focus:ring-primary focus:border-primary transition-all"
              type="text" id="mTag" placeholder="fix, feature..." />
          </div>
        </div>

        <div class="form-group">
          <label for="mCategory" class="block text-sm font-semibold text-black mb-1">Catégorie</label>
          <select
            class="w-full text-sm border-2 border-border rounded px-4 py-2.5 bg-bg text-text font-mono focus:ring-2 focus:ring-primary focus:border-primary transition-all"
            id="mCategory">
            <option value="semaine">Semaine</option>
            <option value="urgent">Urgent</option>
            <option value="aujourd_hui">Aujourd_hui</option>
          </select>
        </div>

        <div class="alert hidden p-3 rounded text-sm font-mono bg-red-950 text-red-200 border border-red-800"
          id="modalAlert" role="alert"></div>

        <div class="flex justify-end gap-3 mt-6 pt-4 border-t-2 border-border">
          <button class="px-5 py-2.5 text-sm font-semibold text-black hover:text-slate-400 rounded transition-colors"
            id="cancelBtn">Annuler</button>
          <button class="px-5 py-2.5 text-sm font-semibold bg-primary text-bg rounded hover:bg-white transition-colors"
            id="saveBtn">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/tasks.js"></script>
</body>

</html>
